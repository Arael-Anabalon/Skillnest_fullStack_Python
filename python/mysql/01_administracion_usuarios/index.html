<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="araelanabalon@liceovvh.cl">
    <title>A Web Page</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <main>
            <form action="#">
                <h2>Inicio de Sesión</h2>
                <div class="form-field">
                    <label for="email">E-mail</label>
                    <input type="text" name="email" id="email" placeholder="Correo electrónico">
                </div>
                <div class="form-field">
                    <label for="password">Contraseña</label>
                    <input type="password" name="pass" id="password" placeholder="Contraseña">
                </div>
                <button class="custom-btn">Iniciar Sesión</button>
            </form>
            <form action="#">
                <h2>Registro</h2>
                <div class="form-field">
                    <label for="reg-name">Nombre</label>
                    <input type="text" name="reg-name" id="reg-name" placeholder="Nombre de usuario">
                </div>
                <div class="form-field">
                    <label for="reg-email">E-mail</label>
                    <input type="text" name="reg-email" id="reg-email" placeholder="Correo electrónico">
                </div>
                <div class="form-field">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" name="reg-pass" id="reg-password" placeholder="Contraseña">
                </div>
                <div class="form-field">
                    <label for="conf-password">Conf. Contraseña</label>
                    <input type="password" name="conf-pass" id="conf-password" placeholder="Confirmar contraseña">
                </div>
                <button class="custom-btn">Registrar</button>
            </form>
        </main>
    </div>
</body>

</html>
