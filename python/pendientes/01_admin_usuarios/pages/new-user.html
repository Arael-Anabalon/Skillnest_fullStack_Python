<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="araelanabalon@liceovvh.cl">
    <title>A Web Page - Nuevo Usuario</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <main>
            <form action="#">
                <h2>Nuevo Usuario</h2>
                <div class="form-field">
                    <label for="name">Nombre</label>
                    <input type="text" name="name" id="reg-name" placeholder="Nombre de usuario">
                </div>
                <div class="form-field">
                    <label for="email">E-mail</label>
                    <input type="text" name="email" id="reg-email" placeholder="Correor electrónico">
                </div>
                <div class="form-field">
                    <label for="password">Contraseña</label>
                    <input type="password" name="pass" id="password" placeholder="Contraseña">
                </div>
                <div class="form-field">
                    <label for="conf-password">Conf. Contraseña</label>
                    <input type="password" name="conf-pass" id="conf-password" placeholder="Confirmar contraseña">
                </div>
                <div class="form-field">
                    <label for="user-type">Tipo de Usuario</label>
                    <select name="user-type" id="user-type">
                        <option value="#" disabled selected>Elegir opción . . .</option>
                        <option value="admin">Administrador</option>
                        <option value="user">Usuario</option>
                    </select>
                </div>
                <button class="custom-btn">Crear</button>
            </form>
        </main>
    </div>
</body>

</html>
