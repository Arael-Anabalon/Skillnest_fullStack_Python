<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="araelanabalon@liceovvh.cl">
    <title>A Web Page - Admin Dashboard</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <button class="custom-btn">Nuevo Usuario</button>
        <main>
            <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>E-mail</th>
                    <th>Tipo Usuario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="username">Cargando . . .</td>
                    <td id="email">Cargando . . .</td>
                    <td id="user-type">Cargando . . .</td>
                    <td id="actions">
                        <button><i class="bi bi-pencil-fill"></i></button>
                        <button><i class="bi bi-trash3-fill"></i></button>
                        <button><i class="bi bi-envelope-fill"></i></button>
                    </td>
                </tr>
            </tbody>
        </table>
        </main>
    </div>
</body>

</html>
